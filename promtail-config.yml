server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 1. Scrape Fail2ban logs on the host VPS
  - job_name: fail2ban
    static_configs:
      - targets: [localhost]
        labels:
          job: fail2ban
          host: vps-server
          __path__: /var/log/fail2ban.log

  # 2. Scrape Nginx Access logs
  - job_name: nginx-access
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx-access
          host: vps-server
          __path__: /var/log/nginx/access.log
