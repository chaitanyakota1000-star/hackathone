# =========================================================================
# Hardened Nginx Reverse Proxy with GeoIP2 Geographic Log Tagging
# =========================================================================

worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # --- GeoIP2 Database Configuration ---
    # WARNING: This requires the GeoLite2-Country.mmdb file to be present in /usr/share/GeoIP/
    geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
        $geoip2_country_code default=XX source=$remote_addr country iso_code;
        $geoip2_country_name default=Unknown source=$remote_addr country names en;
    }

    # --- Custom GeoIP2 Log Format ---
    log_format main_geoip '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$geoip2_country_code" "$geoip2_country_name"';

    access_log /var/log/nginx/access.log main_geoip;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
