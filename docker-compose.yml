version: '3.8'

services:
  # MySQL Relational Database Service
  db:
    image: mysql:8.0
    container_name: hospital_db_container
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=hospital_db
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    security_opt:
      - no-new-privileges:true

  # Express Backend Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizsync_app
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - RATE_LIMIT_WINDOW_MS=900000 # 15 minutes
      - RATE_LIMIT_MAX_REQUESTS=100
      - ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=hospital_db
      - DB_PORT=3306
      - JWT_SECRET=supersecretjwttokenforhackathon
    # Only expose port to internal docker network. Forces traffic through Nginx proxy.
    expose:
      - "3000"
    depends_on:
      - db
    security_opt:
      - no-new-privileges:true

  # Hardened Nginx Reverse Proxy
  proxy:
    image: nginx:1.25-alpine
    container_name: quizsync_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    security_opt:
      - no-new-privileges:true

  # Central Log Database (Loki)
  loki:
    image: grafana/loki:2.9.0
    container_name: monitoring_loki
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    security_opt:
      - no-new-privileges:true

  # Log Shipping Agent (Promtail)
  promtail:
    image: grafana/promtail:2.9.0
    container_name: monitoring_promtail
    restart: always
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log/nginx:/var/log/nginx:ro
      - /var/log/fail2ban.log:/var/log/fail2ban.log:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    security_opt:
      - no-new-privileges:true

  # Visualization Dashboard (Grafana)
  grafana:
    image: grafana/grafana:10.2.0
    container_name: monitoring_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki
    security_opt:
      - no-new-privileges:true

volumes:
  db_data:
