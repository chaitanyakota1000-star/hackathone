worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Information Disclosure Minimization ---
    server_tokens off; # Hide Nginx version details

    # --- Logging Optimizations ---
    log_format main_secure '$remote_addr - $remote_user [$time_local] "$request" '
                           '$status $body_bytes_sent "$http_referer" '
                           '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main_secure;
    error_log /var/log/nginx/error.log warn;

    # --- Resource Buffer Allocations (Slowloris/DoS Protection) ---
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    client_max_body_size 10k; # Restrict uploaded files size limit

    # --- Network Connection Lifespans ---
    keepalive_timeout 30s;
    send_timeout 10s;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # --- Gzip Compression ---
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- Shared Memory Adaptive Rate Limiter Zones ---
    # Global Rate Limiter: Allows 30 requests per second per IP
    limit_req_zone $binary_remote_addr zone=global_limit_zone:10m rate=30r/s;

    # Concurrent Connection Limiter: Tracks maximum open TCP sockets per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit_zone:10m;

    # Login Specific Rate Limiting: Limits /api/auth/login requests to 5 per minute per IP
    map $request_uri $login_limit_key {
        default "";
        ~*^/api/auth/login$ $binary_remote_addr;
    }
    limit_req_zone $login_limit_key zone=login_limit_zone:10m rate=5r/m;

    # --- Web Application Firewall (WAF) Rules ---
    # 1. Block malicious URI patterns (Directory Traversal, SQLi, XSS, Dotfiles, Scans)
    map $request_uri $is_bad_request {
        default 0;
        # Directory Traversal
        ~*(\.\./|\.\.\\) 1;
        # Dotfiles and sensitive configurations
        ~*(\.git|\.env|\.config|\.yaml|\.yml|\.sql|\.bak) 1;
        # SQL Injection (SQLi) signatures
        ~*(union|select|insert|update|delete|drop|alter|concat|char|declare|cast)\b 1;
        # Cross-Site Scripting (XSS) signatures
        ~*(<script|script>|javascript:|onclick|onerror|onload|alert\() 1;
        # Admin / Debug scanning paths
        ~*(wp-admin|wp-login|config|setup|eval|shell) 1;
    }

    # 2. Block bad bots, scrapers, and scanner User-Agents
    map $http_user_agent $is_bad_bot {
        default 0;
        ~*(sqlmap|nikto|wpscan|nmap|nessus|dirbuster|gobuster|acunetix|scrapy) 1;
    }

    # 3. Map to detect directory scanners and track by binary IP
    map $request_uri $is_recon_scanner {
        default "";
        ~*(\.env|\.git|\.config|\.sql|\.yml|\.yaml|\.bak|setup\.php)$ $binary_remote_addr;
        ~*(wp-admin|wp-login|phpmyadmin|administrator|setup|install|admin) $binary_remote_addr;
    }

    # Define the scanner auto-banning rate limiting zone (1 req/min threshold)
    limit_req_zone $is_recon_scanner zone=scanner_block_zone:10m rate=1r/m;

    server {
        listen 80;
        server_name localhost;

        # Restrict concurrent TCP connections from a single IP to 10
        limit_conn conn_limit_zone 10;
        limit_conn_status 429;

        # Apply scanner auto-banning limit (2 requests within 1 minute triggers block)
        limit_req zone=scanner_block_zone burst=1 nodelay;
        limit_req_status 403;

        # Error redirection for HTTP 429 (Rate Limit Breached)
        error_page 429 = @rate_limit_fallback;

        location @rate_limit_fallback {
            default_type application/json;
            return 429 '{"error": "Too many requests. Please try again later."}';
        }

        # Drop requests matched by WAF rules
        if ($is_bad_request) {
            return 403; # Forbidden
        }
        if ($is_bad_bot) {
            return 403; # Forbidden
        }

        # Protect the login endpoint with strict rate limits (5 requests per minute, burst of 2 allowed)
        location /api/auth/login {
            limit_req zone=login_limit_zone burst=2 nodelay;
            limit_req_status 429;

            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route requests to Express server container
        location / {
            # Apply global rate limiting to all general requests (30 requests/sec, burst of 50)
            limit_req zone=global_limit_zone burst=50 nodelay;
            limit_req_status 429;

            # Core Proxy Pass Routing to Compose service container
            proxy_pass http://app:3000;
            
            # Proxy headers setup
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Buffer tunings for backend connections
            proxy_buffering on;
            proxy_buffers 8 8k;
            proxy_buffer_size 8k;
        }

        # Custom security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    }
}
