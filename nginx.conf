worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Information Disclosure Minimization ---
    server_tokens off; # Hide Nginx version details

    # --- Logging Optimizations ---
    log_format main_secure '$remote_addr - $remote_user [$time_local] "$request" '
                           '$status $body_bytes_sent "$http_referer" '
                           '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main_secure;
    error_log /var/log/nginx/error.log warn;

    # --- Resource Buffer Allocations (Slowloris/DoS Protection) ---
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    client_max_body_size 10k; # Restrict uploaded files size limit

    # --- Network Connection Lifespans ---
    keepalive_timeout 30s;
    send_timeout 10s;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # --- Gzip Compression ---
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- Shared Memory Adaptive Rate Limiter Zone ---
    # Tracks clients by Binary IP (saves memory). Allocates 10MB (covers ~160k distinct addresses)
    # Rate limit restricted to 10 requests per second
    limit_req_zone $binary_remote_addr zone=api_throttle_zone:10m rate=10r/s;

    # --- Custom Request Filtering (Map) ---
    # Filters out common directory traversal, dotfiles, and admin route scanning
    map $request_uri $is_bad_request {
        default 0;
        ~*(\.\./|\.git|\.env|wp-admin|metadata|\.config) 1;
    }

    server {
        listen 80;
        server_name localhost;

        # Block suspicious requests matched by map filter
        if ($is_bad_request) {
            return 444; # Drop TCP connection immediately with no headers/content
        }

        # Route requests to Express server container
        location / {
            # Apply rate limiting to all requests
            # burst=20 allows spikes up to 20 requests
            # nodelay processes the bursts instantly but rejects any excess
            limit_req zone=api_throttle_zone burst=20 nodelay;

            # Core Proxy Pass Routing to Compose service container
            proxy_pass http://app:3000;
            
            # Proxy headers setup
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Buffer tunings for backend connections
            proxy_buffering on;
            proxy_buffers 8 8k;
            proxy_buffer_size 8k;
        }

        # Custom security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    }
}
